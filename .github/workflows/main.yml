name: Build Debug APK (Clean Build)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 禁用 Gradle 缓存（彻底清除）
      # 如果需要使用缓存，请取消注释并调整 key，但当前目标是不使用缓存
      # - name: Cache Gradle
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.gradle/caches
      #       ~/.gradle/wrapper
      #     key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 清理旧的构建产物
      - name: Clean build
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 硬编码邮件配置（注意安全风险，建议使用 Secrets）
      - name: Send APK via Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.139.com
          server_port: 25
          username: lzyzstiq@139.com
          password: '@15368291z'
          subject: "PING2.0 Debug APK - ${{ github.sha }}"
          to: lzyzstiq@139.com
          from: lzyzstiq@139.com
          body: |
            Hi,
            
            Here is the latest debug APK for PING2.0 built from commit ${{ github.sha }}.
            Please find the attachment.
            
            This is an automated message from GitHub Actions.
          attachments: app/build/outputs/apk/debug/app-debug.apk
